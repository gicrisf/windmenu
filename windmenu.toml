# ===============================================================================
# CUSTOM COMMANDS
# ===============================================================================
# Entries shown alongside discovered applications.
#   args = [...]  runs a shell command/program
#   keys = [...]  sends a keyboard shortcut

[[commands]]
name = "Windows Terminal"
args = ["wt"]

[[commands]]
name = "Shutdown"
args = ["shutdown.exe", "/s"]

[[commands]]
name = "Restart"
args = ["shutdown.exe", "/r"]

[[commands]]
name = "Log Off"
args = ["shutdown.exe", "/l"]

[[commands]]
name = "Hibernate"
args = ["shutdown.exe", "/h"]

[[commands]]
name = "Maximize Window"
keys = ["WIN", "UP"]
