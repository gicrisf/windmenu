bg        = "#1e1e2e"
fg        = "#cdd6f4"
bg_select = "#89b4fa"
fg_select = "#1e1e2e"
bg_input  = "#313244"
fg_input  = "#cdd6f4"

[themes.catppuccin-frappe]
bg        = "#303446"
fg        = "#c6d0f5"
bg_select = "#8caaee"
fg_select = "#303446"
bg_input  = "#414559"
fg_input  = "#c6d0f5"

[themes.nord]
bg        = "#2e3440"
fg        = "#d8dee9"
bg_select = "#5e81ac"
