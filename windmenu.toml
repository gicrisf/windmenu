# ===============================================================================
# WindMenu Configuration File
# ===============================================================================
# Controls the appearance and behavior of WindMenu, a Windows application
# launcher with a dmenu-like interface. Changes apply on daemon restart.

# --- Daemon ---
# Activation hotkey: any number of modifiers (WIN/CTRL/ALT/SHIFT) plus exactly
# one other key.
hotkey = ["CTRL", "ALT", "SPACE"]
# Examples:
#   hotkey = ["ALT", "F2"]            # (like GNOME)
#   hotkey = ["WIN", "SHIFT", "SPACE"]

# --- Search ---
# matching: how the typed query is compared against each entry
#   "complete" - whole query matched as a substring
#   "keywords" - each whitespace-separated word must match
#   "fuzzy"    - fzf-style subsequence scoring, results sorted by score (default)
matching = "fuzzy"
case_sensitive = false                # Match case exactly (default: false)

# --- Window ---
lines = 12                            # Number of menu items to display
width = 1000                          # Window width in pixels (centers the window)
padding = 8                           # Horizontal padding in pixels
font = "Consolas 20"                  # Font as "Family Size" (monospace recommended)
# prompt = "Run :"                    # Text shown in the input box (default: none)

# --- Colors ---
# Select a named preset from the [themes.*] tables below.
theme = "default"
# Optionally override individual colors (these win over the selected theme):
#   bg        = "#1e1e1e"   # Window background
#   fg        = "#ffffff"   # Window text
#   bg_select = "#0078d4"   # Selected item background
#   fg_select = "#ffffff"   # Selected item text
#   bg_input  = "#2d2d2d"   # Input box background
#   fg_input  = "#ffffff"   # Input box text

# ===============================================================================
# THEMES
# ===============================================================================
# Each [themes.<name>] defines a color scheme. Add your own or edit these.

# Built-in default (Windows blue) — matches the no-config appearance.
[themes.default]
bg        = "#1e1e1e"
fg        = "#ffffff"
bg_select = "#0078d4"
fg_select = "#ffffff"
bg_input  = "#2d2d2d"
fg_input  = "#ffffff"

