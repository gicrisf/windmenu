# ===============================================================================
# WindMenu Configuration File
# ===============================================================================
# This configuration file controls the appearance and behavior of WindMenu,
# a Windows application launcher with a dmenu-like interface.

# ===============================================================================
# DAEMON
# ===============================================================================

# Custom hotkey (default is ["CTRL", "ALT", "SPACE"])
# Examples:
# hotkey = ["CTRL", "ALT", "X"] # Ctrl+Alt+X
# hotkey = ["ALT", "F2"]        # Alt+F2 (like GNOME)
# hotkey = ["WIN", "SHIFT", "SPACE"]

# The hotkey is registered with Windows (RegisterHotKey): any number of
# modifiers (WIN/CTRL/ALT/SHIFT) plus exactly one other key.

# ===============================================================================
# SEARCH
# ===============================================================================
# How the typed query matches menu entries (search behavior, not appearance).

[search]
# matching: how the query is compared against each entry
#   "complete" - whole query matched as a substring
#   "keywords" - each whitespace-separated word must match
#   "fuzzy"    - fzf-style subsequence scoring, results sorted by score (default)
matching = "fuzzy"
case_sensitive = false              # Match case exactly (default: false)

# ===============================================================================
# THEME
# ===============================================================================
# Configure the appearance of the WindMenu interface using descriptive field names.
# The menu renderer is built into windmenu; changes apply on daemon restart.

[theme]
lines = 12                          # Number of menu items to display
padding = 8                         # Horizontal padding in pixels
width = 1000                        # Window width in pixels
background_color = "#1e1e2e"        # Window background (Catppuccin Mocha base)
text_color = "#cdd6f4"              # Window text (Catppuccin Mocha text)
selected_background_color = "#89b4fa"  # Highlighted item background (Catppuccin Mocha blue)
selected_text_color = "#1e1e2e"     # Highlighted item text (dark on light)
entry_background_color = "#313244"  # Input box background (Catppuccin Mocha surface0)
entry_text_color = "#cdd6f4"        # Input box text (Catppuccin Mocha text)
font = "Consolas 20"                # Font as "Family Size" (monospace recommended)
prompt = "Run :"                    # Custom prompt text shown in input box

# ===============================================================================
# CUSTOM COMMANDS
# ===============================================================================
# Define custom commands that appear in the menu alongside discovered applications.
# Two command types are supported:
# - args: Execute shell commands/programs
# - keys: Send keyboard shortcuts

[[commands]]
name = "Windows Terminal"
args = ["wt"] # <-- Shell command

[[commands]]
name = "Shutdown"
args = ["shutdown.exe", "/s"]

[[commands]]
name = "Restart"
args = ["shutdown.exe", "/r"]

[[commands]]
name = "Log Off"
args = ["shutdown.exe", "/l"]

[[commands]]
name = "Hibernate"
args = ["shutdown.exe", "/h"]

[[commands]]
name = "Maximize Window"
keys = ["WIN", "UP"] # <-- Keyboard shortcut
