name: Build

on:
  push:
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-gnu
    
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64 zip

    - name: Cache cargo dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build windmenu.exe
      run: |
        RUSTFLAGS="-C target-feature=+crt-static" \
          cargo build --release --target x86_64-pc-windows-gnu

    - name: Verify build outputs
      run: |
        if [ ! -f "target/x86_64-pc-windows-gnu/release/windmenu.exe" ]; then
          echo "ERROR: windmenu.exe was not built!"
          exit 1
        fi
        echo "✓ Build output verified"

    - name: Create ZIP archive
      run: |
        mkdir -p release-zip
        cp target/x86_64-pc-windows-gnu/release/windmenu.exe release-zip/
        cp autostart/autostart.ps1 release-zip/
        cp autostart/README.md release-zip/AUTOSTART.md
        cp windmenu.toml release-zip/
        cp README.md release-zip/
        cp LICENSE release-zip/

        cd release-zip
        zip -r ../windmenu.zip .
        cd ..
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windmenu-build-${{ github.sha }}
        path: |
          windmenu.zip
        retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Get tag name
      id: tag_info
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: windmenu-build-${{ github.sha }}
        path: ./artifacts
    
    - name: Move artifacts to root
      run: mv ./artifacts/* ./
    
    - name: Prepare Release Notes
      run: |
        if [ -f "RELEASE_NOTES.md" ]; then
          echo "✓ Using RELEASE_NOTES.md"
          cp RELEASE_NOTES.md release_notes.md
        else
          echo "⚠️ No RELEASE_NOTES.md found - using default template"
          echo "## WindMenu ${{ steps.tag_info.outputs.tag }}" > release_notes.md
          echo "(Default release notes here...)" >> release_notes.md
        fi
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.tag_info.outputs.tag }}
        name: WindMenu ${{ steps.tag_info.outputs.tag }}
        body_path: release_notes.md
        draft: false
        prerelease: ${{ contains(steps.tag_info.outputs.tag, '-') }}
        files: |
          windmenu.zip
        token: ${{ secrets.GITHUB_TOKEN }}