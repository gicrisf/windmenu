# ===============================================================================
# WindMenu Theme Pack — Catppuccin
# ===============================================================================
# Install with:
#   windmenu config pack add catppuccin
# Import from windmenu.toml with:
#   import = ["themes/catppuccin.toml"]
# Then pick a scheme:
#   theme = "catppuccin-mocha"
#   theme = "catppuccin-frappe"

[themes.catppuccin-frappe]
bg        = "#303446"   # base
fg        = "#c6d0f5"   # text
bg_select = "#8caaee"   # blue
fg_select = "#303446"   # base (dark on light)
bg_input  = "#414559"   # surface0
fg_input  = "#c6d0f5"   # text

# Alternative accent colors for bg_select:
# - Rosewater: #f2d5cf   - Flamingo:  #eebebe   - Pink:     #f4b8e4
# - Mauve:     #ca9ee6   - Red:       #e78284   - Maroon:   #ea999c
# - Peach:     #ef9f76   - Yellow:    #e5c890   - Green:    #a6d189
# - Teal:      #81c8be   - Sky:       #99d1db   - Sapphire: #85c1dc
# - Blue:      #8caaee (current)               - Lavender: #babbf1

[themes.catppuccin-mocha]
bg        = "#1e1e2e"   # base
fg        = "#cdd6f4"   # text
bg_select = "#89b4fa"   # blue
fg_select = "#1e1e2e"   # base (dark on light)
bg_input  = "#313244"   # surface0
fg_input  = "#cdd6f4"   # text

# Alternative accent colors for bg_select:
# - Rosewater: #f5e0dc   - Flamingo:  #f2cdcd   - Pink:     #f5c2e7
# - Mauve:     #cba6f7   - Red:       #f38ba8   - Maroon:   #eba0ac
# - Peach:     #fab387   - Yellow:    #f9e2af   - Green:    #a6e3a1
# - Teal:      #94e2d5   - Sky:       #89dceb   - Sapphire: #74c7ec
# - Blue:      #89b4fa (current)               - Lavender: #b4befe
