# ===============================================================================
# WindMenu Configuration - Catppuccin Frappé Theme
# ===============================================================================

[theme]
lines = 12                          # Number of menu items to display
padding = 8                         # Horizontal padding in pixels
width = 1000                        # Window width in pixels
background_color = "#303446"        # Window background (Catppuccin Frappé base)
text_color = "#c6d0f5"              # Window text (Catppuccin Frappé text)
selected_background_color = "#8caaee"  # Highlighted item background (Catppuccin Frappé blue)
selected_text_color = "#303446"     # Highlighted item text (dark on light)
entry_background_color = "#414559"  # Input box background (Catppuccin Frappé surface0)
entry_text_color = "#c6d0f5"        # Input box text (Catppuccin Frappé text)
font = "Consolas 16"                # Font as "Family Size"
prompt = "Run:"                     # Custom prompt text shown in input box

# ===============================================================================
# Catppuccin Frappé Palette Reference
# ===============================================================================
# Alternative accent colors you can use for selected_background_color:
# - Rosewater: #f2d5cf (soft pink)
# - Flamingo:  #eebebe (peachy pink)
# - Pink:      #f4b8e4 (bright pink)
# - Mauve:     #ca9ee6 (purple)
# - Red:       #e78284 (red)
# - Maroon:    #ea999c (dark pink)
# - Peach:     #ef9f76 (orange)
# - Yellow:    #e5c890 (warm yellow)
# - Green:     #a6d189 (soft green)
# - Teal:      #81c8be (cyan-green)
# - Sky:       #99d1db (light blue)
# - Sapphire:  #85c1dc (blue-cyan)
# - Blue:      #8caaee (default - current selection)
# - Lavender:  #babbf1 (light purple)
