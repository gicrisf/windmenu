# ===============================================================================
# WindMenu Command Pack — Windows Tools
# ===============================================================================
# Common admin consoles and utilities. Import from windmenu.toml with:
#   import = ["packs/windows-tools-commands.toml"]
#
# Note: .msc consoles are launched through their host, mmc.exe — windmenu runs
# commands directly (no shell association), so `["devmgmt.msc"]` alone would fail.

[[commands]]
name = "Device Manager"
args = ["mmc.exe", "devmgmt.msc"]

[[commands]]
name = "Services"
args = ["mmc.exe", "services.msc"]

[[commands]]
name = "Disk Management"
args = ["mmc.exe", "diskmgmt.msc"]

[[commands]]
name = "Event Viewer"
args = ["mmc.exe", "eventvwr.msc"]

[[commands]]
name = "Task Scheduler"
args = ["mmc.exe", "taskschd.msc"]

[[commands]]
name = "Computer Management"
args = ["mmc.exe", "compmgmt.msc"]

[[commands]]
name = "Task Manager"
args = ["taskmgr.exe"]

[[commands]]
name = "Registry Editor"
args = ["regedit.exe"]

[[commands]]
name = "System Information"
args = ["msinfo32.exe"]

[[commands]]
name = "Control Panel"
args = ["control.exe"]
