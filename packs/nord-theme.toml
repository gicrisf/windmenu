# ===============================================================================
# WindMenu Theme Pack — Nord
# ===============================================================================
# Import from windmenu.toml with:
#   import = ["packs/nord-theme.toml"]
# Then select the scheme:
#   theme = "nord"

[themes.nord]
bg        = "#2e3440"
fg        = "#d8dee9"
bg_select = "#88c0d0"
fg_select = "#2e3440"
bg_input  = "#3b4252"
fg_input  = "#d8dee9"

# Alternative accent colors for bg_select:
# - Cyan:    #88c0d0 (current)   - Teal:   #8fbcbb   - Blue:   #81a1c1
# - Muted:   #5e81ac             - Red:    #bf616a   - Orange: #d08770
# - Yellow:  #ebcb8b             - Green:  #a3be8c   - Purple: #b48ead
