# ===============================================================================
# WindMenu Command Pack — Power
# ===============================================================================
# Import from windmenu.toml with:
#   import = ["packs/power-commands.toml"]

[[commands]]
name = "Shutdown"
args = ["shutdown.exe", "/s", "/t", "0"]

[[commands]]
name = "Restart"
args = ["shutdown.exe", "/r", "/t", "0"]

[[commands]]
name = "Log Off"
args = ["shutdown.exe", "/l"]

[[commands]]
name = "Hibernate"
args = ["shutdown.exe", "/h"]

[[commands]]
name = "Lock"
args = ["rundll32.exe", "user32.dll,LockWorkStation"]
