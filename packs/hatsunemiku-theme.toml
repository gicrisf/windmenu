# ===============================================================================
# WindMenu Theme Pack — Hatsune Miku
# ===============================================================================
# Install with:
#   windmenu config pack install hatsunemiku
# Import from windmenu.toml with:
#   import = ["packs/hatsunemiku-theme.toml"]
# Then select the scheme:
#   theme = "hatsunemiku"

[themes.hatsunemiku]
bg        = "#242829"   # dark gray
fg        = "#dcd7d7"   # light gray
bg_select = "#7cc7d6"   # iconic Miku cyan
fg_select = "#242829"   # dark on light
bg_input  = "#333738"   # slightly lighter base
fg_input  = "#dcd7d7"   # light gray

# Alternative accent colors for bg_select:
# - Cyan:    #7cc7d6 (current)   - Magenta: #bc7fd2   - Pink:  #df2683
# - Blue:    #1a86b9             - Green:   #13868c   - Cream: #fcfcdf
