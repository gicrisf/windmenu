# ===============================================================================
# WindMenu Command Pack — Windows Terminal
# ===============================================================================
# Key combination commands for Windows Terminal management.
# Install with:
#   windmenu config pack install wt-keys
# Import from windmenu.toml with:
#   import = ["packs/wt-keys-commands.toml"]

## Tab Management
[[commands]]
name = "WT Next Tab"
keys = ["CTRL", "ALT", "RIGHT"]

[[commands]]
name = "WT Previous Tab"
keys = ["CTRL", "ALT", "LEFT"]

[[commands]]
name = "WT Settings"
keys = ["CTRL", "COMMA"]

[[commands]]
name = "WT New Tab"
keys = ["CTRL", "SHIFT", "T"]

## Font Size Control
[[commands]]
name = "WT Decrease Font Size"
keys = ["CTRL", "-"]

[[commands]]
name = "WT Increase Font Size"
keys = ["CTRL", "+"]

[[commands]]
name = "WT Reset Font Size"
keys = ["CTRL", "0"]

## Pane Management
[[commands]]
name = "WT Duplicate Pane"
keys = ["ALT", "SHIFT", "D"]

[[commands]]
name = "WT Split Pane Down"
keys = ["ALT", "SHIFT", "-"]

[[commands]]
name = "WT Split Pane Right"
keys = ["ALT", "SHIFT", "+"]

[[commands]]
name = "WT Close Pane"
keys = ["CTRL", "SHIFT", "W"]

## Pane Navigation
[[commands]]
name = "WT Focus Up"
keys = ["ALT", "UP"]

[[commands]]
name = "WT Focus Down"
keys = ["ALT", "DOWN"]

[[commands]]
name = "WT Focus Left"
keys = ["ALT", "LEFT"]

[[commands]]
name = "WT Focus Right"
keys = ["ALT", "RIGHT"]

# Pane Resizing
[[commands]]
name = "WT Resize Up"
keys = ["ALT", "SHIFT", "UP"]

[[commands]]
name = "WT Resize Down"
keys = ["ALT", "SHIFT", "DOWN"]

[[commands]]
name = "WT Resize Left"
keys = ["ALT", "SHIFT", "LEFT"]

[[commands]]
name = "WT Resize Right"
keys = ["ALT", "SHIFT", "RIGHT"]

# Other Terminal Functions
[[commands]]
name = "WT Find"
keys = ["CTRL", "SHIFT", "F"]

[[commands]]
name = "WT New Window"
keys = ["CTRL", "SHIFT", "N"]

[[commands]]
name = "WT Toggle Mark Mode"
keys = ["CTRL", "SHIFT", "M"]
