# ===============================================================================
# WindMenu Theme Pack — dmenu
# ===============================================================================
# Install with:
#   windmenu config pack install dmenu
# Import from windmenu.toml with:
#   import = ["packs/dmenu-theme.toml"]
# Then select the scheme:
#   theme = "dmenu"

[themes.dmenu]
bg        = "#1e1e1e"   # Window background
fg        = "#ffffff"   # Window text
bg_select = "#285577"   # Selected item background
fg_select = "#ffffff"   # Selected item text
bg_input  = "#2d2d2d"   # Input box background
fg_input  = "#ffffff"   # Input box text
